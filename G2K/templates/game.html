<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>DeepConnect - In Game</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            transition: background 0.6s ease; 
            padding-top: 100px; 
            color: white; 
            margin: 0; 
            height: 100vh; 
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        /* Categorie Kleuren */
        .waiting { background: #2c3e50; }
        .ice_breakers { background: #3498db; }
        .minigames { background: #e74c3c; }
        .diepgaand { background: #9b59b6; }
        .boomit { background: #f1c40f; color: #2c3e50; }
        .end { background: #2ecc71; color: white; }

        .q-card { 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(10px);
            padding: 50px; 
            border-radius: 30px; 
            width: 80%; 
            max-width: 800px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }

        #cat-label { font-size: 1.2em; opacity: 0.8; letter-spacing: 2px; margin-bottom: 10px; }
        #question-text { font-size: 2.5em; margin: 20px 0; min-height: 150px; display: flex; align-items: center; justify-content: center; }

        #next-btn { 
            margin-top: 40px; 
            padding: 15px 40px; 
            font-size: 1.2em; 
            cursor: pointer; 
            border-radius: 50px; 
            border: none; 
            background: white; 
            color: #333; 
            font-weight: bold;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }
        #next-btn:hover { transform: scale(1.05); background: #f0f0f0; }
        #next-btn:active { transform: scale(0.95); }
    </style>
</head>
<body id="game-body" class="waiting">

    <div class="q-card">
        <div id="cat-label">WAKKER WORDEN...</div>
        <h1 id="question-text">Wachten op de host om de game te starten.</h1>
        
        <button id="next-btn" style="display:none;" onclick="requestNext()">VOLGENDE VRAAG</button>
    </div>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('code');
        const name = urlParams.get('name');

        // Meld je aan bij de server
        socket.emit('join_game', {room: room, name: name});

        // Host check: Alleen de host krijgt de knop te zien
        if (name === "HOST") {
            document.getElementById('next-btn').style.display = "inline-block";
        }

        socket.on('next_round', (data) => {
            // Update UI
            document.body.className = data.category;
            document.getElementById('cat-label').innerText = data.category.replace('_', ' ').toUpperCase();
            document.getElementById('question-text').innerText = data.question;
        });

        socket.on('game_over', (data) => {
            document.body.className = "end";
            document.getElementById('cat-label').innerText = "FINISH";
            document.getElementById('question-text').innerText = data.message;
            document.getElementById('next-btn').style.display = "none";
        });

        function requestNext() {
            socket.emit('request_next', {room: room});
        }
    </script>
</body>
</html>
