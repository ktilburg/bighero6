<!DOCTYPE html>
<html>
<head>
    <title>Get2Know - Spel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        :root {
            --bg-color: #FFF9E9;
            --card-shadow: 12px 12px 0px rgba(0,0,0,0.1);
            --wyr-teal: #1abc9c;
            --wyr-blue: #b4c7ed;
            --green-line: #e3f4e1;
        }

        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            background-color: var(--bg-color);
            margin: 0; padding-top: 100px; min-height: 100vh; overflow-x: hidden;
            position: relative;
            transition: background-color 0.5s ease;
        }

        #bg-lines {
            position: fixed; top: 50%; left: 0; transform: translateY(-50%);
            width: 100vw; height: 90vh; z-index: -1;
            background-repeat: no-repeat; background-position: center;
            background-size: 100% 100%; transition: background-image 0.5s ease-in-out;
            pointer-events: none;
        }

        /* Intro Overlay Styles */
        #intro-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: 9999; display: none; align-items: center; justify-content: center;
            background-color: var(--bg-color);
        }
        #intro-bg {
            position: absolute; width: 100vw; height: 90vh;
            background-image: url('/static/images/background_rounded_line_dark_blue.png');
            background-size: 100% 100%; background-repeat: no-repeat; background-position: center;
        }
        .intro-content { position: relative; display: flex; align-items: center; justify-content: center; width: 100%; }
        .intro-banner {
            background: white; border: 3px solid black; padding: 20px 80px;
            font-size: 80px; font-weight: 900; border-radius: 40px;
            box-shadow: 0px 10px 0px black; z-index: 2;
        }
        .intro-star { position: absolute; z-index: 3; width: 150px; }
        .intro-star.star-1 { left: 10%; top: -40px; transform: rotate(-15deg); }
        .intro-star.star-2 { right: 10%; bottom: -40px; transform: rotate(15deg); }
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { from { opacity: 1; } to { opacity: 0; visibility: hidden; } }

        .game-container {
            position: relative; display: inline-block;
            width: 95%; max-width: 800px;
            margin-top: 60px; z-index: 1;
        }

        .q-card { 
            background: white; padding: 60px 40px; border-radius: 40px; 
            position: relative; z-index: 2; box-shadow: var(--card-shadow);
            border: 3px solid #000; min-height: 300px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .decoration { position: absolute; z-index: 3; pointer-events: none; transition: all 0.3s ease; }
        .star-tl { top: -60px; left: -70px; width: 180px; }
        .star-br { bottom: -80px; right: -70px; width: 220px; }

        .theme-logo { 
            position: absolute; top: -85px; left: 50%; transform: translateX(-50%); 
            z-index: 4; height: 120px;
            transition: all 0.4s ease-in-out;
        }

        body.theme-ice_breakers .theme-logo {
            position: fixed; top: 40px; right: 0; left: auto;
            transform: none; height: 100px; border-radius: 20px 0 0 20px;
        }

        h1#question-text { font-size: 36px; font-weight: 800; margin: 0; color: #000; line-height: 1.2; }

        #wyr-options-container {
            display: none; grid-template-columns: 1fr 1fr; gap: 30px;
            margin-top: 40px; width: 100%; position: relative; z-index: 5;
        }

        .wyr-btn {
            border: 4px solid #000; border-radius: 30px; padding: 30px 20px;
            font-size: 24px; font-weight: 800; cursor: pointer;
            box-shadow: 8px 8px 0px #000; transition: transform 0.1s, background-color 0.2s;
        }
        
        .wyr-btn.teal { background-color: var(--wyr-teal) !important; }
        .wyr-btn.blue { background-color: var(--wyr-blue) !important; }

        body:not(.is-host) .wyr-btn:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0px #000; }
        body.is-host .wyr-btn { cursor: default; }

        #answer-input { padding: 20px; width: 85%; border-radius: 20px; border: 3px solid #000; margin-top: 25px; font-size: 20px; }
        .ans-btn { background: #000; color: #fff; border: none; padding: 20px 40px; border-radius: 20px; margin-top: 20px; cursor: pointer; font-weight: bold; font-size: 18px; }
        
        #next-btn { 
            position: fixed; bottom: 40px; right: 40px; z-index: 10;
            background: #FFD700; border: 3px solid #000; padding: 20px 35px; 
            border-radius: 60px; font-weight: 900; cursor: pointer; box-shadow: 6px 6px 0px #000; font-size: 20px;
        }

        #results-area { background: #fff; padding: 30px; border-radius: 25px; border: 3px solid #000; margin-top: 30px; display: none; text-align: left; width: 100%; box-sizing: border-box; font-size: 20px; }
    </style>
</head>
<body id="game-body">

    <div id="intro-overlay">
        <div id="intro-bg"></div>
        <div class="intro-content">
            <img src="/static/images/star_blue.png" class="intro-star star-1">
            <div class="intro-banner">ICEBREAKER</div>
            <img src="/static/images/star_pink.png" class="intro-star star-2">
        </div>
    </div>

    <div id="bg-lines"></div>

    <div class="game-container">
        <img id="theme-logo" src="" class="theme-logo" style="display:none;">
        <img id="star-tl" src="/static/images/star_blue.png" class="decoration star-tl">
        <img id="star-br" src="/static/images/star_pink.png" class="decoration star-br">

        <div class="q-card">
            <h1 id="question-text">Laden...</h1>
            
            <div id="answer-section" style="display:none; width: 100%;">
                <input type="text" id="answer-input" placeholder="Typ je antwoord...">
                <button class="ans-btn" onclick="sendAnswer()">Verstuur</button>
            </div>

            <!-- Minigame containers worden nu expliciet gereset -->
            <div id="hangman-wrap" style="display:none; margin-top: 25px;">
                <div id="hangman-word" style="font-size:45px; letter-spacing:8px; font-weight:bold;"></div>
                <div id="hangman-meta" style="margin: 20px 0; font-size: 20px;"></div>
                <div id="hangman-controls">
                    <input type="text" id="hangman-input" maxlength="1" style="width:60px; text-align:center; padding:15px; border:3px solid #000; font-size: 24px;">
                    <button class="ans-btn" onclick="sendHangmanLetter()">Gok</button>
                </div>
            </div>

            <div id="thirty-wrap" style="display:none; margin-top: 25px;">
                <div id="thirty-words" style="display:flex; flex-wrap:wrap; gap:15px; justify-content:center; font-size: 22px;"></div>
                <h2 id="thirty-timer" style="color: red; margin-top: 30px; font-size: 40px;">30s</h2>
                <button id="thirty-start-btn" class="ans-btn" style="display:none; margin-top: 10px;" onclick="requestThirtySecondsStart()">Start</button>
            </div>

            <div id="status-bar" style="margin-top: 20px; font-weight: bold; color: #555; font-size: 18px;"></div>
            <div id="results-area"></div>
            
            <div id="feedback-wrap" style="display: none; gap: 15px; margin-top: 20px;">
                <button class="ans-btn" style="background:#2ecc71" onclick="sendFeedback('up')">👍</button>
                <button class="ans-btn" style="background:#e74c3c" onclick="sendFeedback('down')">👎</button>
            </div>
        </div>

        <div id="wyr-options-container">
            <button id="wyr-0" class="wyr-btn teal" onclick="submitWyr(0)"></button>
            <button id="wyr-1" class="wyr-btn blue" onclick="submitWyr(1)"></button>
        </div>
    </div>

    <button id="next-btn" style="display:none;" onclick="requestNext()">VOLGENDE ➔</button>

    <script>
        const socket = io();
        const urlParams = new URLSearchParams(window.location.search);
        const room = urlParams.get('code');
        let myName = urlParams.get('name');
        let thirtyInterval;
        let thirtyRoundActive = false;
        let introShown = false;

        if(myName === "HOST") document.body.classList.add('is-host');

        // Verbeterde reset functie
        function resetUI() {
            document.getElementById('answer-section').style.display = "none";
            document.getElementById('wyr-options-container').style.display = "none";
            document.getElementById('hangman-wrap').style.display = "none";
            document.getElementById('thirty-wrap').style.display = "none";
            document.getElementById('results-area').style.display = "none";
            document.getElementById('feedback-wrap').style.display = "none";
            document.getElementById('status-bar').innerText = "";
            
            // Ook de inhoud even leegmaken om flikkeringen van oude woorden te voorkomen
            document.getElementById('hangman-word').innerText = "";
            document.getElementById('thirty-words').innerHTML = "";
        }

        socket.emit('join_game', {room: room, name: myName});

        socket.on('next_round', (data) => {
            clearInterval(thirtyInterval);
            thirtyRoundActive = false;
            resetUI(); // Hier worden alle containers verborgen

            if (data.category === 'ice_breakers' && !introShown) {
                showIntroAnimation();
                introShown = true;
            }

            document.body.classList.forEach(cls => { if(cls.startsWith('theme-')) document.body.classList.remove(cls); });
            document.body.classList.add('theme-' + data.category);

            document.getElementById('question-text').innerText = data.question;
            updateVisuals(data.category);

            // Specifieke logica per type zet de juiste container weer op "block"
            if (data.category === 'would_you_rather' && data.options) {
                document.getElementById('wyr-options-container').style.display = "grid";
                document.getElementById('wyr-0').innerText = data.options[0];
                document.getElementById('wyr-1').innerText = data.options[1];
            } 
            else if (data.type === 'hangman') {
                document.getElementById('hangman-wrap').style.display = "block";
                updateHangman(data.payload);
            }
            else if (data.type === 'thirty_seconds') {
                document.getElementById('thirty-wrap').style.display = "block";
                prepareThirtySeconds(data.payload);
            }
            else if (data.mode === 'digitaal' && myName !== "HOST") {
                document.getElementById('answer-section').style.display = "block";
                document.getElementById('answer-input').value = "";
            }

            if (myName === "HOST") document.getElementById('next-btn').style.display = "block";
        });

        function showIntroAnimation() {
            const overlay = document.getElementById('intro-overlay');
            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.classList.add('fade-out');
                setTimeout(() => {
                    overlay.style.display = 'none';
                }, 800);
            }, 1500);
        }

        function updateVisuals(cat) {
            const logo = document.getElementById('theme-logo');
            const sTL = document.getElementById('star-tl');
            const sBR = document.getElementById('star-br');
            const bgLines = document.getElementById('bg-lines');
            const body = document.getElementById('game-body');

            logo.style.display = "block";
            sTL.style.display = "block"; 
            sBR.style.display = "block";
            body.style.backgroundColor = "var(--bg-color)";

            if(cat === 'ice_breakers') {
                logo.src = "/static/images/icebreaker_label.png";
                sTL.src = "/static/images/star_blue.png";
                sBR.src = "/static/images/star_pink.png";
                bgLines.style.backgroundImage = "url('/static/images/background_rounded_line_blue.png')";
            } else if(cat === 'get2know') {
                logo.src = "/static/images/get_2_know_header.png";
                sTL.src = "/static/images/star_yellow.png";
                sBR.src = "/static/images/star_orange.png";
                bgLines.style.backgroundImage = "url('/static/images/background_rounded_line_orange.png')";
            } else if(cat === 'would_you_rather') {
                logo.src = "/static/images/would_you_rather_header.png";
                bgLines.style.backgroundImage = "url('/static/images/background_rounded_line_green.png')";
                sTL.style.display = "none"; sBR.style.display = "none";
            }
        }

        socket.on('game_over', (data) => {
            resetUI();
            document.getElementById('question-text').innerText = data.message;
            document.getElementById('next-btn').style.display = "none";
            document.getElementById('theme-logo').style.display = "none";
            document.getElementById('star-tl').style.display = "none";
            document.getElementById('star-br').style.display = "none";
            document.getElementById('bg-lines').style.backgroundImage = "none";
            document.getElementById('game-body').style.backgroundColor = "var(--green-line)";
        });

        function sendAnswer() {
            const val = document.getElementById('answer-input').value;
            if(!val) return;
            socket.emit('submit_answer', {room: room, name: myName, answer: val});
            document.getElementById('answer-section').style.display = "none";
            document.getElementById('question-text').innerText = "Wachten op de rest...";
        }

        function submitWyr(idx) {
            if(myName === "HOST") return;
            const val = document.getElementById('wyr-' + idx).innerText;
            socket.emit('submit_answer', {room: room, name: myName, answer: val});
            document.getElementById('wyr-options-container').style.display = "none";
            document.getElementById('question-text').innerText = "Keuze verzonden!";
        }

        function requestNext() {
            const force = document.getElementById('results-area').style.display === "block" || 
                         document.getElementById('wyr-options-container').style.display === "grid";
            socket.emit('request_next', {room: room, force_next: force});
        }

        socket.on('update_status', (data) => {
            document.getElementById('status-bar').innerText = `${data.answered} / ${data.total} klaar`;
        });

        socket.on('show_results', (data) => {
            const res = document.getElementById('results-area');
            res.innerHTML = "<strong>Resultaten:</strong><br>" + data.answers.map(a => `<b>${a.player}:</b> ${a.answer}`).join('<br>');
            res.style.display = "block";
            document.getElementById('feedback-wrap').style.display = "flex";
        });

        function updateHangman(p) {
            document.getElementById('hangman-word').innerText = p.word_mask;
            document.getElementById('hangman-meta').innerText = `Levens: ${p.lives} | Fout: ${p.wrong_letters.join(', ')}`;
        }
        function sendHangmanLetter() {
            const l = document.getElementById('hangman-input').value;
            socket.emit('hangman_guess', {room: room, letter: l});
            document.getElementById('hangman-input').value = "";
        }
        socket.on('hangman_state', (p) => updateHangman(p));

        socket.on('thirty_seconds_started', () => {
            beginThirtySecondsCountdown();
        });

        function prepareThirtySeconds(p) {
            const container = document.getElementById('thirty-words');
            const startBtn = document.getElementById('thirty-start-btn');
            const timer = document.getElementById('thirty-timer');
            timer.innerText = (p.timer || 30) + "s";
            startBtn.style.display = myName === "HOST" ? "inline-block" : "none";
            startBtn.disabled = false;
            thirtyRoundActive = false;

            if (myName === "HOST") {
                container.innerHTML = '<span style="color: #999; font-style: italic;">Woorden zichtbaar voor spelers...</span>';
            } else {
                container.innerHTML = p.woorden.map(w => `<span style="background:#eee; padding:10px 15px; border-radius:15px; border:2px solid #000;">${w}</span>`).join(' ');
            }

        }

        function beginThirtySecondsCountdown() {
            if (thirtyRoundActive) return;
            thirtyRoundActive = true;
            document.getElementById('thirty-start-btn').style.display = "none";

            let time = 30;
            document.getElementById('thirty-timer').innerText = time + "s";
            thirtyInterval = setInterval(() => {
                time--;
                document.getElementById('thirty-timer').innerText = time + "s";
                if(time <= 0) clearInterval(thirtyInterval);
            }, 1000);
        }

        function requestThirtySecondsStart() {
            if (myName === "HOST" && !thirtyRoundActive) {
                socket.emit('start_thirty_seconds', {room: room});
            }
        }
    </script>
</body>
</html>
