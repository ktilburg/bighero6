<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Big Hero 6</title>
    <style>
        body {
            overflow-x: hidden;
            width: 100%;
        }

        html {
            scroll-padding-top: 75px;
            scroll-behavior: smooth;
        }

        .mobile-only {
            display: none
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 10%;
            position: sticky;
            top: 0;
            z-index: 1000;
            background-color: #D6C2C7;
            font-family: 'Neuething Sans', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .nav-links {
            display: flex;
            gap: 40px;
        }

        .nav-links a {
            color: #732942;
            text-decoration: none;
            font-weight: 500;
            font-size: 18px;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 25px;
            height: 3px;
            background-color: #732942;
            border-radius: 2px;
        }

        .carousel-container {
            position: relative;
            width: 100vw;
            margin: auto;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .carousel-track {
            display: flex;
            transition: transform 0.5s ease-in-out;
            width: 100vw;
        }

        .carousel-track img {
            min-width: 80vw;
            margin-left: 10vw;
            margin-right: 10vw;
        }

        .arrow {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            font-size: 60px;
            font-weight: bold;
            color: #732942;
            z-index: 20;
            user-select: none;
            padding: 20px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .prev::before {
            content: "← ";
        }

        .next::before {
            content: " →";
        }

        .prev {
            left: 2vw;
        }

        .next {
            right: 2vw;
        }

        .title-kernwaarden {
            font-family: Coolvetica, arial, sans-serif;
            font-size: 8em;
            text-align: center;
            font-style: italic;
            color: #732942;
        }

        @media (max-width: 1000px) {
            .title-kernwaarden {
                font-size: 6em;
            }
        }

        @media (max-width: 700px) {
            .navbar {
                padding: 10px 5%;
            }

            .hamburger {
                display: flex;
            }

            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: #D6C2C7;
                padding: 20px 0;
                gap: 20px;
                text-align: center;
                box-shadow: 0 4px 5px rgba(0, 0, 0, 0.05);
            }

            .nav-links.active {
                display: flex;
                padding: 5px 0;
            }

            .desktop-only {
                display: none;
            }

            .mobile-only {
                display: block;
                width: 100%;
                height: auto;
            }

            .arrow {
                font-size: 20px;
            }

            .title-kernwaarden {
                font-size: 4em;
            }
        }
    </style>
</head>

<body style="margin: 0; padding: 0; font-family: Arial, sans-serif; background-color: #f5f5f5;">
    <nav class="navbar">
        <a href="#header" style="display: flex; align-items: center; height: 75px;">
            <img src="images/Logogroepering.png" alt="" class="desktop-only" style="width: 200px; height: auto;">
            <img src="images/Logo.png" alt="" class="mobile-only" style="width: 50px; height: auto;">
        </a>

        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <div class="nav-links" id="navLinks">
            <a href="#wie-zijn-wij" onclick="toggleMenu()">Over ons</a>
            <a href="#situaties" onclick="toggleMenu()">Project</a>
            <a href="#ons-proces" onclick="toggleMenu()">Proces</a>
        </div>
    </nav>

    <script>
        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            if (window.innerWidth > 700) return;

            const isOpening = !navLinks.classList.contains('active');
            navLinks.classList.toggle('active');

            if (isOpening) {
                navLinks.style.display = 'flex';
                navLinks.style.flexDirection = 'column';
                navLinks.style.overflow = 'hidden';

                navLinks.animate([
                    { height: '0px', opacity: 0, transform: 'translateY(-10px)' },
                    { height: navLinks.scrollHeight + 'px', opacity: 1, transform: 'translateY(0)' }
                ], {
                    duration: 400,
                    easing: 'ease-out',
                    fill: 'forwards'
                });
            } else {
                const closingAnim = navLinks.animate([
                    { height: navLinks.scrollHeight + 'px', opacity: 1, transform: 'translateY(0)' },
                    { height: '0px', opacity: 0, transform: 'translateY(-10px)' }
                ], {
                    duration: 300,
                    easing: 'ease-in',
                    fill: 'forwards'
                });

                closingAnim.onfinish = () => {
                    if (!navLinks.classList.contains('active')) {
                        navLinks.style.display = 'none';
                    }
                };
            }
        }

        window.addEventListener('resize', () => {
            const navLinks = document.getElementById('navLinks');
            if (window.innerWidth > 700) {
                navLinks.style.display = '';
                navLinks.style.flexDirection = '';
                navLinks.style.height = '';
                navLinks.style.opacity = '';
                navLinks.style.transform = '';
                navLinks.classList.remove('active');

                navLinks.getAnimations().forEach(anim => anim.cancel());
            }
        });

    </script>
    <header style="display: flex; justify-content: center; align-items: center;">
        <img src="images/desktop/Header.png" id="header" class="desktop-only" alt="" style="width: 80vw; height: auto;">
        <img src="images/mobile/Header.png" class="mobile-only" alt="">
    </header>
    <main style="display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px;">
        <div id="wie-zijn-wij" style="display: flex; justify-content: center; width: 100%;">

            <img src="images/desktop/Wie zijn wij.png" class="desktop-only"
                alt="Wie zijn wij?... Big Hero 6 staat voor samenwerking, innovatie en impact. Net als in de film combineren wij verschillende talenten om samen tot één krachtig en doordacht eindresultaat te komen. Daarnaast fungeert Baymax in de film als een mentale steun voor Hiro: een companion die hem helpt wanneer hij het moeilijk heeft. Dit sluit aan bij ons uiteindelijke doel: jongeren ondersteunen zodat zij zich beter in hun vel voelen, onder andere door het bevorderen van sociaal contact"
                style="width: 80vw; height: auto;">

            <img src="images/mobile/Wie zijn wij.png" class="mobile-only"
                alt="Wie zijn wij?... Big Hero 6 staat voor samenwerking, innovatie en impact. Net als in de film combineren wij verschillende talenten om samen tot één krachtig en doordacht eindresultaat te komen. Daarnaast fungeert Baymax in de film als een mentale steun voor Hiro: een companion die hem helpt wanneer hij het moeilijk heeft. Dit sluit aan bij ons uiteindelijke doel: jongeren ondersteunen zodat zij zich beter in hun vel voelen, onder andere door het bevorderen van sociaal contact"
                style="width: 80vw; height: auto;">

        </div>

        <img src="images/desktop/Ons team frame.png" class="desktop-only" alt=""
            style="width: 100vw; height: auto; overflow-x: hidden;">
        <img src="images/mobile/Ons team frame.png" class="mobile-only" alt=""
            style="width: 100vw; height: auto; overflow-x: hidden;">
        <div>
            <h1 class="title-kernwaarden">Onze kernwaarden</h1>
            <div class="carousel-container">
                <div class="arrow prev" onclick="moveSlide(-1)"></div>

                <div class="carousel-track" id="track">
                    <img src="images/kernwaarden/1vrijheid.png" alt="Vrijheid">
                    <img src="images/kernwaarden/2betrouwbaarheid.png" alt="Betrouwbaarheid">
                    <img src="images/kernwaarden/3veiligheid.png" alt="Veiligheid">
                    <img src="images/kernwaarden/4gemak.png" alt="Gemak">
                    <img src="images/kernwaarden/5eerlijkheid.png" alt="Eerlijkheid">
                </div>

                <div class="arrow next" onclick="moveSlide(1)"></div>
            </div>
            <script>
                let currentSlide = 0;
                const track = document.getElementById('track');
                const slides = track.children;

                function moveSlide(direction) {
                    currentSlide += direction;

                    if (currentSlide < 0) {
                        currentSlide = slides.length - 1;
                    } else if (currentSlide >= slides.length) {
                        currentSlide = 0;
                    }

                    const moveAmount = -currentSlide * 100;
                    track.style.transform = `translateX(${moveAmount}vw)`;
                }
            </script>
        </div>
        <img src="images/desktop/Situaties.png" id="situaties" alt=""
            style="width: 100vw; height: auto; overflow-x: hidden;">
        <img src="images/desktop/Ontwerpvragen.png" alt="" style="width: 50vw; height: auto;">
        <img src="images/desktop/Ons proces.png" id="ons-proces" alt=""
            style="width: 100vw; height: auto; overflow-x: hidden;">
        <img src="images/desktop/Next steps doel.png" alt="" style="width: 100vw; height: auto; overflow-x: hidden;">
        <img src="images/desktop/Next steps onderzoek.png" alt=""
            style="width: 100vw; height: auto; overflow-x: hidden;">
        <img src="images/desktop/Next steps ontwikkelen.png" alt=""
            style="width: 100vw; height: auto; overflow-x: hidden;">
        <img src="images/desktop/Next steps testen.png" alt="" style="width: 100vw; height: auto; overflow-x: hidden;">
        <img src="images/desktop/Resultaat.png" alt="" style="width: 50vw; height: auto;">
    </main>
    <footer>
        <a href="mailto:team.big.hero.6.hr@gmail.com">
            <img src="images/desktop/Footer.png" alt="" style="width: 100vw; height: auto; overflow-x: hidden;">
        </a>
    </footer>
</body>

</html>
