    display: none

    <main style="display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 20px;">
        <img src="images/desktop/Wie zijn wij.png" id="wie-zijn-wij" class="desktop-only" alt="Wie zijn wij?... Big Hero 6 staat voor samenwerking, innovatie en impact. Net als in de film combineren wij verschillende talenten om samen tot één krachtig en doordacht eindresultaat te komen. Daarnaast fungeert Baymax in de film als een mentale steun voor Hiro: een companion die hem helpt wanneer hij het moeilijk heeft. Dit sluit aan bij ons uiteindelijke doel: jongeren ondersteunen zodat zij zich beter in hun vel voelen, onder andere door het bevorderen van sociaal contact" style="width: 80vw; height: auto;">
        <img src="images/mobile/Wie zijn wij.png" id="wie-zijn-wij" class="mobile-only" alt="Wie zijn wij?... Big Hero 6 staat voor samenwerking, innovatie en impact. Net als in de film combineren wij verschillende talenten om samen tot één krachtig en doordacht eindresultaat te komen. Daarnaast fungeert Baymax in de film als een mentale steun voor Hiro: een companion die hem helpt wanneer hij het moeilijk heeft. Dit sluit aan bij ons uiteindelijke doel: jongeren ondersteunen zodat zij zich beter in hun vel voelen, onder andere door het bevorderen van sociaal contact" style="width: 80vw; height: auto;">
