<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rotterdam Activiteiten</title>
    <style>
        :root {
            --rdam-green: #00a353;
            --rdam-white: #ffffff;
            --rdam-dark: #333;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f4f4f4; color: var(--rdam-dark); margin: 0; padding: 20px; }
        header { text-align: center; border-bottom: 5px solid var(--rdam-green); padding-bottom: 20px; margin-bottom: 30px; }
        .container { max-width: 800px; margin: 0 auto; }
        
        /* Activity Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .card { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); cursor: pointer; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); border: 2px solid var(--rdam-green); }
        .category { font-size: 0.8em; color: var(--rdam-green); font-weight: bold; text-transform: uppercase; }

        /* Controls */
        .controls { text-align: center; margin: 30px 0; }
        button { background: var(--rdam-green); color: white; border: none; padding: 12px 25px; border-radius: 25px; font-size: 1rem; cursor: pointer; }
        button:hover { background: #008242; }

        /* Random Result Section */
        #random-area { background: #e9f7ef; padding: 20px; border-radius: 10px; margin-top: 20px; display: none; text-align: center; border: 2px dashed var(--rdam-green); }
        .form-group { margin-top: 15px; }
        select, button.submit { margin-top: 10px; }

        /* Hidden initially */
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Prototype spint 1</h1>
        <p>Ontdek wat er te doen is in Rotterdam</p>
    </header>

    <div class="controls">
        <button onclick="generateRandom()">Genereer Willekeurige Activiteit</button>
    </div>

    <div id="activity-grid" class="grid">
        </div>

    <div id="random-area">
        <h2 id="random-title"></h2>
        <p id="random-cat"></p>
        <hr>
        <div id="survey-step-1">
            <p>Zou je hieraan deelnemen?</p>
            <button onclick="handleParticipation(true)">Ja, zeker!</button>
            <button onclick="handleParticipation(false)" style="background:#cc0000">Nee, bedankt</button>
        </div>

        <div id="survey-step-2" class="hidden">
            <p>Waarom spreekt deze activiteit je aan?</p>
            <select id="reason-select">
                <option value="loneliness">Eenzaamheid tegengaan</option>
                <option value="boredom">Verveling</option>
                <option value="new_people">Nieuwe mensen ontmoeten</option>
                <option value="discover">Nieuwe activiteiten ontdekken</option>
                <option value="broadening">Interesses verbreden</option>
                <option value="other">Anders / Geen antwoord</option>
            </select>
            <br>
            <button class="submit" onclick="submitFinalData()">Verstuur & Opslaan</button>
        </div>
    </div>
</div>

<script>
    // 1. Data
    const activities = [
        { id: 1, name: "Kunsthal Bezoek", category: "Cultuur" },
        { id: 2, name: "Padel in Kralingen", category: "Sport" },
        { id: 3, name: "Markthal Proeverij", category: "Eten" },
        { id: 4, name: "Euromast Beklimmen", category: "Sightseeing" },
        { id: 5, name: "Boottocht Maas", category: "Ontspanning" },
        { id: 6, name: "Workshop Graffiti", category: "Creatief" }
    ];

    let currentRandomActivity = null;
    let db;

    // 2. Database Initialization (IndexedDB)
    const request = indexedDB.open("RotterdamDB", 1);
    request.onupgradeneeded = (e) => {
        db = e.target.result;
        db.createObjectStore("submissions", { autoIncrement: true });
    };
    request.onsuccess = (e) => { db = e.target.result; };

    // 3. Render Homepage
    const grid = document.getElementById('activity-grid');
    activities.forEach(act => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `<span class="category">${act.category}</span><h3>${act.name}</h3>`;
        card.onclick = () => {
            if(confirm(`Ben je geïnteresseerd in meer activiteiten in de categorie: ${act.category}?`)) {
                alert("Bedankt! We houden hier rekening mee.");
            }
        };
        grid.appendChild(card);
    });

    // 4. Random Logic
    function generateRandom() {
        const useInterests = confirm("Wilt u dat we rekening houden met uw interesses voor deze selectie?");
        
        // Pick random
        const randomIndex = Math.floor(Math.random() * activities.length);
        currentRandomActivity = activities[randomIndex];

        // UI Updates
        document.getElementById('activity-grid').classList.add('hidden');
        const area = document.getElementById('random-area');
        area.style.display = 'block';
        document.getElementById('random-title').innerText = currentRandomActivity.name;
        document.getElementById('random-cat').innerText = `Categorie: ${currentRandomActivity.category}`;
        
        // Reset steps
        document.getElementById('survey-step-1').classList.remove('hidden');
        document.getElementById('survey-step-2').classList.add('hidden');
    }

    function handleParticipation(willJoin) {
        if (!willJoin) {
            alert("Terug naar startpagina...");
            location.reload();
        } else {
            document.getElementById('survey-step-1').classList.add('hidden');
            document.getElementById('survey-step-2').classList.remove('hidden');
        }
    }

    // 5. Saving to "Database"
    function submitFinalData() {
        const reason = document.getElementById('reason-select').value;
        const entry = {
            activity: currentRandomActivity.name,
            category: currentRandomActivity.category,
            reason: reason,
            timestamp: new Date().toISOString()
        };

        const transaction = db.transaction(["submissions"], "readwrite");
        const store = transaction.objectStore("submissions");
        store.add(entry);

        transaction.oncomplete = () => {
            alert("Gegevens succesvol opgeslagen in de browser database! Bedankt voor je deelname.");
            location.reload();
        };
    }
</script>

</body>
</html>
